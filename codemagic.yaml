workflows:
  ios-workflow:
    name: Vanish iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic2
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.geekmagnetinc.vanish"
        APP_APPLE_ID: "6768208618"
      node: 22
      xcode: latest
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: npm install + cap sync
        script: |
          npm install --no-optional
          npx cap sync ios
      - name: Auto-increment build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_APPLE_ID" 2>/dev/null || echo 0)
          LATEST_TF=$(app-store-connect get-latest-testflight-build-number "$APP_APPLE_ID" 2>/dev/null || echo 0)
          NEXT=$((LATEST > LATEST_TF ? LATEST : LATEST_TF))
          NEXT=$((NEXT + 1))
          agvtool new-version -all "$NEXT"
      - name: Build ipa
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true